<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Promissão Concursos - ACE</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/192/000000/education.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Active Cache Buster & Service Worker Purger
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (let reg of registrations) {
            reg.unregister().then(() => {
              console.log('Service Worker antigo removido para garantir atualização online real-time!');
            });
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then((keys) => {
          keys.forEach((key) => {
            caches.delete(key).then(() => {
              console.log('Cache removido:', key);
            });
          });
        });
      }
    </script>
  </body>
</html>
